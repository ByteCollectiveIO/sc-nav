services:
  sc-nav:
    build: .
    container_name: sc-nav
    # Explicit ${VAR} refs (not env_file) so Portainer stack env vars get
    # substituted in; env_file only loads literal file contents, no interpolation.
    environment:
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI}
      - ORG_GUILD_ID=${ORG_GUILD_ID}
      - ADMIN_IDS=${ADMIN_IDS}
      - SESSION_SECRET=${SESSION_SECRET}
      - COOKIE_SECURE=${COOKIE_SECURE}
      - ORG_MEMBER_ROLE_ID=${ORG_MEMBER_ROLE_ID}
      - SC_NAV_PUBLIC_URL=${SC_NAV_PUBLIC_URL}
    # Bound to localhost only: the cloudflared sidecar reaches the app over the
    # internal Docker network (http://sc-nav:8765), so there's no need to expose
    # it on the LAN — doing so would bypass the Cloudflare Access/WAF layer.
    ports:
      - "127.0.0.1:8765:8765"   # host-local only; drop entirely if you never need direct access
    volumes:
      - sc-nav-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:8765/api/health', timeout=3)"]
      interval: 60s
      timeout: 5s
      start_period: 30s

  # Cloudflare Tunnel — outbound-only; exposes the app over HTTPS with no
  # inbound ports. Public hostname (nav.bytecollective.io) -> http://sc-nav:8765
  # is configured in the Zero Trust dashboard. If you were running cloudflared
  # as a standalone container, stop it so you don't run two connectors.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sc-nav-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - sc-nav

volumes:
  sc-nav-data:
